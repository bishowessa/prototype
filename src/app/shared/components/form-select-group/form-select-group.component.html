<section class="space-y-4">
  <div class="flex justify-between items-center" *ngIf="label">
    <label class="text-base font-bold text-slate-900 dark:text-white">
      {{ label }}
    </label>
  </div>
  <div [ngClass]="gridClass">
    @for (opt of options; track opt.value) {
      <button
        type="button"
        class="relative flex flex-col p-4 border-2 border-slate-100 dark:border-slate-800 rounded-xl cursor-pointer hover:border-primary/30 transition-all text-left"
        [ngClass]="{ 'border-primary! bg-primary/5': value === opt.value }"
        (click)="onSelect(opt)"
      >
        @if (opt.icon) {
          <span class="material-symbols-outlined mb-2 text-slate-400">
            {{ opt.icon }}
          </span>
        }
        <span class="text-sm font-bold text-slate-900 dark:text-white">
          {{ opt.title }}
        </span>
        @if (opt.description) {
          <span class="text-xs text-slate-500">
            {{ opt.description }}
          </span>
        }
      </button>
    }
  </div>
</section>
