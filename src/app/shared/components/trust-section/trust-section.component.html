<section class="bg-blue-900 py-16 px-6 lg:px-20 text-white relative overflow-hidden">
  <div class="absolute top-0 right-0 p-12 opacity-10 pointer-events-none">
    <app-icon name="security" customClass="!text-[300px]" />
  </div>
  <div class="max-w-4xl mx-auto relative z-10">
    <div class="grid md:grid-cols-2 gap-12 items-center">
      <div>
        <div
          class="inline-flex items-center gap-2 mb-4 px-3 py-1 rounded-full bg-blue-800 text-blue-200 text-xs font-semibold uppercase border border-blue-700"
        >
          <app-icon [name]="badgeIcon()" size="sm" />
          {{ badgeText() }}
        </div>
        <h2 class="text-3xl font-bold mb-4">{{ heading() }}</h2>
        <p class="text-blue-100 text-lg mb-6 leading-relaxed">
          {{ paragraph() }}
        </p>
        <button
          class="bg-white text-primary font-bold py-3 px-6 rounded-lg hover:bg-blue-50 transition-colors"
        >
          {{ buttonLabel() }}
        </button>
      </div>
      <div class="bg-blue-800/50 backdrop-blur-sm p-6 rounded-xl border border-blue-700">
        <ul class="space-y-4">
          @for (item of items(); track item.title) {
            <li class="flex gap-3">
              <app-icon name="check_circle" size="sm" customClass="text-blue-300" />
              <div>
                <h4 class="font-bold">{{ item.title }}</h4>
                <p class="text-sm text-blue-200">
                  {{ item.description }}
                </p>
              </div>
            </li>
          }
        </ul>
      </div>
    </div>
  </div>
</section>
