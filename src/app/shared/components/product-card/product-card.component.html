<div
  class="group bg-white dark:bg-slate-800 rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-700 hover:shadow-xl hover:shadow-blue-900/5 transition-all"
>
  <div class="relative h-48 overflow-hidden bg-gray-100 dark:bg-slate-700">
    @if (showMatchBadge()) {
      <div
        class="absolute top-3 right-3 z-10 bg-white/90 dark:bg-slate-900/90 backdrop-blur text-primary text-xs font-bold px-2 py-1 rounded-full border border-primary/20 flex items-center gap-1 shadow-sm"
      >
        <app-icon name="auto_awesome" size="sm" /> Match
      </div>
    }
    <div
      class="w-full h-full bg-cover bg-center group-hover:scale-105 transition-transform duration-500"
      [attr.data-alt]="imageAlt()"
      [style.background-image]="'url(\'' + imageUrl() + '\')'"
    ></div>
  </div>
  <div class="p-4 flex flex-col gap-3">
    <div>
      <h3 class="text-lg font-bold text-slate-900 dark:text-white leading-tight">
        {{ title() }}
      </h3>
      <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">{{ subtitle() }}</p>
    </div>
    <div class="flex items-end justify-between">
      <span class="text-xl font-bold text-slate-900 dark:text-white">{{ price() }}</span>
      <div class="flex items-center gap-1 text-yellow-500 text-sm font-medium">
        <app-icon name="star" size="sm" [filled]="true" /> {{ rating() }}
      </div>
    </div>
    <div class="pt-3 border-t border-slate-100 dark:border-slate-700">
      <label class="flex items-center gap-2 cursor-pointer group/check">
        <input
          class="rounded border-slate-300 text-primary focus:ring-primary h-4 w-4"
          type="checkbox"
        />
        <span
          class="text-sm font-medium text-slate-600 dark:text-slate-300 group-hover/check:text-primary transition-colors"
          >Compare</span
        >
      </label>
    </div>
  </div>
</div>
