<div
  class="group bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl overflow-hidden"
  [class.border-primary]="open"
>
  <div
    class="flex items-center justify-between p-6 cursor-pointer list-none"
    (click)="toggle()"
  >
    <div class="flex items-center gap-4">
      <div
        class="w-12 h-12 bg-blue-50 dark:bg-blue-900/30 text-primary rounded-xl flex items-center justify-center"
      >
        <app-icon [name]="icon" size="lg" />
      </div>
      <div>
        <h3 class="text-xl font-bold">{{ title }}</h3>
        <p class="text-sm text-slate-500">{{ subtitle }}</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      @if (skippable) {
        <button
          type="button"
          class="text-xs font-semibold text-slate-400 hover:text-primary transition-colors flex items-center gap-1"
          (click)="onSkip($event)"
        >
          {{ skipLabel }}
          <span class="material-symbols-outlined !text-sm">arrow_forward</span>
        </button>
      }
      <span
        class="material-symbols-outlined transition-transform"
        [class.rotate-180]="open"
      >
        expand_more
      </span>
    </div>
  </div>
  @if (open) {
    <div class="px-6 pb-8 pt-2">
      <ng-content />
    </div>
  }
</div>
