<div
  class="group p-6 rounded-2xl bg-background-light dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-primary/50 transition-all duration-300 hover:shadow-lg hover:shadow-blue-500/10"
>
  <div
    class="w-12 h-12 rounded-lg bg-blue-100 dark:bg-blue-900/50 text-primary flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"
  >
    <app-icon [name]="icon()" />
  </div>
  <h3 class="text-xl font-bold mb-2 text-slate-900 dark:text-white">
    {{ title() }}
  </h3>
  <p class="text-slate-600 dark:text-slate-300">
    {{ description() }}
  </p>
</div>
