<header
  class="sticky top-0 z-50 bg-white/90 dark:bg-background-dark/90 backdrop-blur-md shadow-sm border-b border-slate-200 dark:border-slate-800"
>
  <div class="max-w-7xl mx-auto px-4 py-3 sm:px-6 lg:px-20">
    <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:gap-6">
      <div class="flex items-center gap-4 w-full lg:contents">
      <!-- Left: Brand & Categories -->
      <div class="flex items-center gap-4 shrink-0">
        <button
          type="button"
          (click)="navigateToHome()"
          class="flex items-center gap-2 text-left transition-opacity hover:opacity-80"
        >
          <div class="text-primary">
            <app-icon name="manage_search" size="xl" />
          </div>
          <span class="text-lg font-bold leading-tight tracking-tight text-slate-900 dark:text-white">
            Smart Compare
          </span>
        </button>

        <div class="relative hidden sm:block" (click)="$event.stopPropagation()">
          <button
            type="button"
            (click)="toggleCategoriesMenu(); $event.stopPropagation()"
            class="flex items-center gap-1 rounded-lg px-3 py-2 text-sm font-semibold text-slate-700 transition-colors hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800"
          >
            Categories
            <span class="material-symbols-outlined text-base!">expand_more</span>
          </button>

          @if (categoriesMenuOpen()) {
            <div
              class="absolute left-0 mt-2 w-52 rounded-xl border border-slate-200 bg-white py-2 shadow-xl dark:border-slate-700 dark:bg-slate-900 z-50"
            >
              @for (category of categories; track category.type) {
                <button
                  type="button"
                  (click)="navigateToCategory(category.type)"
                  class="w-full px-4 py-2.5 text-left text-sm font-medium text-slate-700 transition-colors hover:bg-slate-50 hover:text-primary dark:text-slate-200 dark:hover:bg-slate-800"
                >
                  {{ category.label }}
                </button>
              }
            </div>
          }
        </div>
      </div>

      <!-- Center: Global Search -->
      <form
        class="hidden w-full lg:flex lg:flex-1 lg:max-w-2xl lg:mx-auto"
        (ngSubmit)="onSearchSubmit()"
      >
        <div class="relative w-full">
          <span
            class="material-symbols-outlined pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl!"
          >
            search
          </span>
          <input
            type="search"
            name="navbarSearch"
            [(ngModel)]="searchQuery"
            (keydown.enter)="onSearchSubmit()"
            placeholder="Search for phones, laptops, or brands..."
            class="w-full rounded-xl border border-slate-200 bg-slate-50 py-2.5 pl-11 pr-12 text-sm text-slate-900 outline-none transition-colors placeholder:text-slate-400 focus:border-primary focus:bg-white dark:border-slate-700 dark:bg-slate-800 dark:text-white dark:focus:bg-slate-900"
          />
          <button
            type="submit"
            class="absolute right-1.5 top-1/2 -translate-y-1/2 rounded-lg p-1.5 text-slate-500 transition-colors hover:bg-slate-200 hover:text-primary dark:hover:bg-slate-700"
            aria-label="Search"
          >
            <span class="material-symbols-outlined text-xl!">search</span>
          </button>
        </div>
      </form>

      <!-- Right: Compare Tray & Auth -->
      <div class="flex items-center gap-2 sm:gap-3 ml-auto shrink-0">
        <a
          routerLink="/compare"
          class="relative flex h-10 w-10 items-center justify-center rounded-lg text-slate-600 transition-colors hover:bg-slate-100 hover:text-primary dark:text-slate-300 dark:hover:bg-slate-800"
          aria-label="Compare products"
        >
          <span class="material-symbols-outlined text-2xl!">balance</span>
          <span
            class="absolute -right-1 -top-1 flex h-5 min-w-5 items-center justify-center rounded-full px-1 text-[10px] font-bold text-white"
            [class]="compareBadgeClass()"
          >
            {{ compareCount() }}
          </span>
        </a>

        @if (showUserMenu()) {
          <div class="relative" (click)="$event.stopPropagation()">
            <button
              type="button"
              (click)="toggleUserMenu(); $event.stopPropagation()"
              class="flex items-center gap-2 rounded-lg h-10 px-3 text-sm font-bold text-slate-900 transition-colors hover:bg-slate-100 dark:text-white dark:hover:bg-slate-800"
            >
              <span class="material-symbols-outlined text-lg!">account_circle</span>
              <span class="hidden lg:inline max-w-35 truncate">{{ displayEmail() }}</span>
              <span class="material-symbols-outlined text-sm!">expand_more</span>
            </button>

            @if (userMenuOpen()) {
              <div
                class="absolute right-0 mt-2 w-56 rounded-xl border border-slate-200 bg-white py-2 shadow-xl dark:border-slate-700 dark:bg-slate-900 z-50"
              >
                @if (!isAdmin()) {
                  <button
                    type="button"
                    (click)="viewProfile()"
                    class="flex w-full items-center gap-2 px-4 py-2.5 text-left text-sm font-medium text-slate-700 transition-colors hover:bg-slate-50 dark:text-slate-200 dark:hover:bg-slate-800"
                  >
                    <span class="material-symbols-outlined text-lg!">person</span>
                    My Profile / Preference
                  </button>
                }
                @if (isAdmin()) {
                  <button
                    type="button"
                    (click)="openAdminDashboard()"
                    class="w-full px-4 py-2.5 text-left text-sm font-medium text-slate-700 transition-colors hover:bg-slate-50 dark:text-slate-200 dark:hover:bg-slate-800"
                  >
                    Admin Dashboard
                  </button>
                }
                <div class="my-1 border-t border-slate-100 dark:border-slate-800"></div>
                <button
                  type="button"
                  (click)="logout()"
                  class="w-full px-4 py-2.5 text-left text-sm font-medium text-red-600 transition-colors hover:bg-slate-50 dark:text-red-400 dark:hover:bg-slate-800"
                >
                  Log Out
                </button>
              </div>
            }
          </div>
        } @else {
          <a
            routerLink="/login"
            class="hidden sm:flex h-10 items-center justify-center rounded-lg px-4 text-sm font-bold text-slate-900 transition-colors hover:bg-slate-100 dark:text-white dark:hover:bg-slate-800"
          >
            Log In
          </a>
          <a
            routerLink="/signup"
            class="flex h-10 items-center justify-center rounded-lg bg-primary px-4 text-sm font-bold text-white shadow-lg shadow-blue-500/20 transition-colors hover:bg-blue-700"
          >
            Sign Up
          </a>
        }
      </div>
      </div>
    </div>

    <!-- Mobile & tablet search -->
    <form class="mt-3 w-full lg:hidden" (ngSubmit)="onSearchSubmit()">
      <div class="relative w-full">
        <span
          class="material-symbols-outlined pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg!"
        >
          search
        </span>
        <input
          type="search"
          name="navbarSearchMobile"
          [(ngModel)]="searchQuery"
          placeholder="Search for phones, laptops, or brands..."
          class="w-full rounded-xl border border-slate-200 bg-slate-50 py-2 pl-10 pr-10 text-sm text-slate-900 outline-none focus:border-primary dark:border-slate-700 dark:bg-slate-800 dark:text-white"
        />
        <button
          type="submit"
          class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-500"
          aria-label="Search"
        >
          <span class="material-symbols-outlined text-lg">search</span>
        </button>
      </div>
    </form>
  </div>
</header>
