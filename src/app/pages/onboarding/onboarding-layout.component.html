<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
  <header
    class="sticky top-0 z-50 flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white/90 dark:bg-background-dark/90 backdrop-blur-md px-6 py-4 lg:px-20"
  >
    <div class="flex items-center gap-4">
      <div class="text-primary">
        <app-icon name="manage_search" size="xl" />
      </div>
      <h2 class="text-lg font-bold leading-tight tracking-tight text-slate-900 dark:text-white">
        SmartCompare
      </h2>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-sm font-medium text-slate-500 dark:text-slate-400">
        {{ stepLabel }}
      </span>
      <div class="w-32 h-2 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
        <div
          class="h-full bg-primary rounded-full transition-all"
          [style.width.%]="stepProgress * 100"
        ></div>
      </div>
    </div>
    <div class="hidden md:block">
      <button
        type="button"
        (click)="onSignOut()"
        class="text-sm font-semibold text-slate-400 hover:text-slate-600 transition-colors"
      >
        Sign Out
      </button>
    </div>
  </header>

  <main
    class="grow flex flex-col items-center justify-center py-12 px-6 lg:px-20 relative bg-background-light dark:bg-background-dark text-slate-900 dark:text-white"
  >
    <div class="absolute inset-0 -z-10 opacity-40 dark:opacity-20 pointer-events-none">
      <div
        class="absolute top-0 right-0 w-1/2 h-1/2 bg-blue-100 dark:bg-blue-900/20 blur-[120px] rounded-full"
      ></div>
      <div
        class="absolute bottom-0 left-0 w-1/3 h-1/3 bg-blue-50 dark:bg-blue-800/10 blur-[100px] rounded-full"
      ></div>
    </div>
    <div class="max-w-5xl w-full">
      @if (currentStep === 1) {
        <app-onboarding-profile-step (skip)="goToStep(2)" />
      }
      @if (currentStep === 2) {
        <!-- Step 2: device selection step will be rendered here -->
        <app-onboarding-device-selection-step
          (back)="goToStep(1)"
          (continue)="goToStep(3)"
        />
      }
      @if (currentStep === 3) {
        <app-onboarding-device-preferences-step
          (back)="goToStep(2)"
          (continue)="goToStep(4)"
        />
      }
      @if (currentStep === 4) {
        <app-onboarding-accessory-preferences-step
          (back)="goToStep(3)"
          (continue)="goToStep(5)"
        />
      }
      @if (currentStep === 5) {
        <app-onboarding-summary-step />
      }
    </div>
  </main>

  <footer
    class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 pt-8 pb-8 px-6 lg:px-20"
  >
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
      <p class="text-xs text-slate-400">© 2024 SmartCompare Inc. All rights reserved.</p>
      <div class="flex gap-6">
        <a class="text-xs text-slate-400 hover:text-primary transition-colors" href="#"
          >Privacy Policy</a
        >
        <a class="text-xs text-slate-400 hover:text-primary transition-colors" href="#"
          >Terms of Service</a
        >
        <span class="flex items-center gap-1 text-xs text-slate-400">
          <app-icon name="language" size="sm" />
          English (US)
        </span>
      </div>
    </div>
  </footer>
</div>
