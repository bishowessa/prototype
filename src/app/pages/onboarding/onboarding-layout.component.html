<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
  <app-onboarding-header
    [stepLabel]="stepLabel()"
    [stepProgress]="stepProgress()"
    (signOut)="onSignOut()"
  />

  <main
    class="grow flex flex-col items-center justify-center py-12 px-6 lg:px-20 relative bg-background-light dark:bg-background-dark text-slate-900 dark:text-white"
  >
    <div class="absolute inset-0 -z-10 opacity-40 dark:opacity-20 pointer-events-none">
      <div
        class="absolute top-0 right-0 w-1/2 h-1/2 bg-blue-100 dark:bg-blue-900/20 blur-[120px] rounded-full"
      ></div>
      <div
        class="absolute bottom-0 left-0 w-1/3 h-1/3 bg-blue-50 dark:bg-blue-800/10 blur-[100px] rounded-full"
      ></div>
    </div>
    <div class="max-w-5xl w-full">
      @if (currentStep() === 1) {
        <app-onboarding-profile-step (skip)="onStepContinue()" />
      }
      @if (currentStep() === 2) {
        <app-onboarding-device-selection-step
          (back)="onStepBack()"
          (continue)="onStepContinue()"
        />
      }
      @if (currentStep() === 3) {
        <app-onboarding-device-preferences-step
          (back)="onStepBack()"
          (continue)="onStepContinue()"
        />
      }
      @if (currentStep() === 4) {
        <app-onboarding-accessory-preferences-step
          (back)="onStepBack()"
          (continue)="onStepContinue()"
        />
      }
      @if (currentStep() === 5) {
        <app-onboarding-summary-step />
      }
    </div>
  </main>

  <app-onboarding-footer />
</div>
