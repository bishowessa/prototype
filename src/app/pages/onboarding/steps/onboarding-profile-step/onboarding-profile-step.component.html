<div class="text-center mb-12">
  <h1 class="text-3xl md:text-4xl font-black text-slate-900 dark:text-white mb-4">
    Welcome! How will you use SmartCompare?
  </h1>
  <p class="text-lg text-slate-500 dark:text-slate-400">
    Select a profile that best describes you to personalize your recommendations.
  </p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
  @for (p of profiles; track p.id) {
    <button
      type="button"
      (click)="onProfileSelect(p.id)"
      class="profile-card group flex flex-col items-start p-8 bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 rounded-3xl hover:border-primary dark:hover:border-primary hover:shadow-xl hover:shadow-primary/10 transition-all text-left w-full"
    >
      <div
        class="w-14 h-14 rounded-2xl bg-blue-50 dark:bg-blue-900/30 flex items-center justify-center text-primary mb-6 group-hover:bg-primary group-hover:text-white transition-colors"
      >
        <app-icon [name]="p.icon" size="xl" />
      </div>
      <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">
        {{ p.title }}
      </h3>
      <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
        {{ p.description }}
      </p>
    </button>
  }
</div>

<div class="text-center">
  <button
    type="button"
    class="text-slate-500 dark:text-slate-400 font-medium hover:text-primary transition-colors flex items-center justify-center gap-2 group"
    (click)="onSkip()"
  >
    Skip, I'll customize manually
    <span class="material-symbols-outlined !text-sm group-hover:translate-x-1 transition-transform">
      arrow_forward
    </span>
  </button>
</div>
