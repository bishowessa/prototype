<div class="mb-12">
  <div class="h-2 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
    <div class="h-full bg-primary w-1/4 rounded-full transition-all duration-500"></div>
  </div>
  <div class="mt-4 flex justify-between">
    <span class="text-xs font-bold text-primary uppercase tracking-widest">Device Selection</span>
    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Preferences</span>
    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Budget</span>
    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Summary</span>
  </div>
</div>

<div class="text-center mb-10">
  <h1 class="text-4xl font-black text-slate-900 dark:text-white mb-4">
    Which devices are you looking for?
  </h1>
  <p class="text-slate-500 dark:text-slate-400 text-lg">
    Select all that apply to help our AI personalize your recommendations.
  </p>
</div>

<div class="grid grid-cols-2 md:grid-cols-3 gap-6 mb-12">
  @for (d of devices; track d.id) {
    <button
      type="button"
      class="device-card relative group flex flex-col items-center justify-center p-8 bg-white dark:bg-slate-900 border-2 rounded-3xl hover:border-primary/50 transition-all duration-200"
      [ngClass]="{
        'border-slate-200 dark:border-slate-800': !isSelected(d.id),
        'border-primary bg-blue-50 dark:bg-blue-900/20 ring-2 ring-primary ring-opacity-50':
          isSelected(d.id)
      }"
      (click)="toggleDevice(d.id)"
    >
      <div
        class="icon-box w-16 h-16 mb-4 rounded-2xl flex items-center justify-center transition-colors"
        [ngClass]="{
          'bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-300': !isSelected(d.id),
          'bg-primary text-white': isSelected(d.id)
        }"
      >
        <app-icon [name]="d.icon" size="xl" />
      </div>
      <span class="font-bold text-slate-900 dark:text-white">{{ d.label }}</span>
      <div
        class="check-icon opacity-0 absolute top-4 right-4 text-primary transition-opacity"
        [ngClass]="{ 'opacity-100': isSelected(d.id) }"
      >
        <span class="material-symbols-outlined !text-2xl font-bold">check_circle</span>
      </div>
    </button>
  }
</div>

<div class="flex items-center justify-between">
  <button
    type="button"
    class="flex items-center gap-2 px-6 py-3 text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white font-bold transition-colors"
    (click)="onBack()"
  >
    <span class="material-symbols-outlined">arrow_back</span>
    Back
  </button>
  <button
    type="button"
    class="flex items-center gap-2 px-10 py-4 bg-primary hover:bg-blue-700 text-white font-bold rounded-2xl transition-all shadow-xl shadow-blue-500/25 text-lg group"
    (click)="onContinue()"
  >
    Continue
    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">
      arrow_forward
    </span>
  </button>
</div>
