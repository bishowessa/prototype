<div class="max-w-4xl w-full">
  <div class="text-center mb-10">
    <h1 class="text-3xl md:text-4xl font-black text-slate-900 dark:text-white mb-4">
      Customize your accessories
    </h1>
    <p class="text-lg text-slate-500 dark:text-slate-400">
      Select your preferences for the tools that complete your setup.
    </p>
  </div>

  <div class="flex flex-col gap-6">
    @if (shouldShowHeadphones) {
      <app-accordion
        icon="headphones"
        title="Headphones"
        subtitle="Audio quality and comfort"
        [initialOpen]="true"
        [skippable]="true"
        (skip)="onSkipHeadphones()"
      >
        <app-headphones-preferences-content
          [value]="headphonesValue"
          (valueChange)="onHeadphonesChange($event)"
        />
      </app-accordion>
    }

    @if (shouldShowMouse) {
      <app-accordion
        icon="mouse"
        title="Mouse"
        subtitle="Precision and ergonomics"
        [skippable]="true"
        (skip)="onSkipMouse()"
      >
        <app-mouse-preferences-content
          [value]="mouseValue"
          (valueChange)="onMouseChange($event)"
        />
      </app-accordion>
    }

    @if (shouldShowKeyboard) {
      <app-accordion
        icon="keyboard"
        title="Keyboard"
        subtitle="Typing feel and layout"
        [skippable]="true"
        (skip)="onSkipKeyboard()"
      >
        <app-keyboard-preferences-content
          [value]="keyboardValue"
          (valueChange)="onKeyboardChange($event)"
        />
      </app-accordion>
    }

    @if (shouldShowCharger) {
      <app-accordion
        icon="power"
        title="Charger"
        subtitle="Power and connectivity"
        [skippable]="true"
        (skip)="onSkipCharger()"
      >
        <app-charger-preferences-content
          [value]="chargerValue"
          (valueChange)="onChargerChange($event)"
        />
      </app-accordion>
    }
  </div>

  <div
    class="mt-16 flex flex-col md:flex-row items-center justify-between gap-6 border-t border-slate-200 dark:border-slate-800 pt-10"
  >
    <button
      type="button"
      class="w-full md:w-auto px-10 py-4 text-slate-500 font-bold hover:text-slate-900 dark:hover:text-white transition-colors flex items-center justify-center gap-2"
      (click)="onBack()"
    >
      <span class="material-symbols-outlined !text-xl">arrow_back</span>
      Back
    </button>
    <div class="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto">
      <button
        type="button"
        class="w-full md:w-auto px-10 py-4 bg-primary text-white rounded-2xl font-bold shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2"
        (click)="onNext()"
      >
        Next Step
        <span class="material-symbols-outlined !text-xl">arrow_forward</span>
      </button>
    </div>
  </div>
</div>
