<div class="max-w-4xl w-full">
  <div class="text-center mb-10">
    <h1 class="text-3xl md:text-4xl font-black text-slate-900 dark:text-white mb-4">
      Customize your accessories
    </h1>
    <p class="text-lg text-slate-500 dark:text-slate-400">
      Select your preferences for the tools that complete your setup.
    </p>
  </div>

  <div class="flex flex-col gap-6">
    @for (config of visibleAccessories(); track config.key) {
      <app-accordion
        [icon]="config.icon"
        [title]="config.title"
        [subtitle]="config.subtitle"
        [initialOpen]="$first"
        [skippable]="true"
        (skip)="onSkip(config.key)"
      >
        @switch (config.key) {
          @case ('headphones') {
            <app-headphones-preferences-content
              [value]="getHeadphonesValue()"
              (valueChange)="onValueChange(config.key, $event)"
            />
          }
          @case ('mouse') {
            <app-mouse-preferences-content
              [value]="getMouseValue()"
              (valueChange)="onValueChange(config.key, $event)"
            />
          }
          @case ('keyboard') {
            <app-keyboard-preferences-content
              [value]="getKeyboardValue()"
              (valueChange)="onValueChange(config.key, $event)"
            />
          }
          @case ('charger') {
            <app-charger-preferences-content
              [value]="getChargerValue()"
              (valueChange)="onValueChange(config.key, $event)"
            />
          }
        }
      </app-accordion>
    }
  </div>

  <div
    class="mt-16 flex flex-col md:flex-row items-center justify-between gap-6 border-t border-slate-200 dark:border-slate-800 pt-10"
  >
    <app-step-navigation-button variant="secondary" icon="arrow_back" (click)="onBack()">
      Back
    </app-step-navigation-button>
    <div class="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto">
      <app-step-navigation-button variant="primary" (click)="onNext()">
        Next Step
      </app-step-navigation-button>
    </div>
  </div>
</div>
