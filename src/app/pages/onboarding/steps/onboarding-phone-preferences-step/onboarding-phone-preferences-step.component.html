<app-base-device-preferences
  title="Phone Preferences"
  description="Help us narrow down the perfect phone for your lifestyle."
  [form]="form"
  [submitLabel]="submitLabel"
  [submitIcon]="submitIcon"
  [isSaving]="isSaving"
  (save)="onSubmit()"
>
  <app-primary-use-input
    [value]="primaryUse"
    (valueChange)="onPrimaryUseChange($event)"
  />

  <app-phone-screen-size-input
    [value]="screenSize"
    (valueChange)="onScreenSizeChange($event)"
  />

  <app-storage-capacity-input
    [value]="storage"
    (valueChange)="onStorageChange($event)"
  />

  <app-price-range-input
    [value]="priceRange"
    (valueChange)="onPriceRangeChange($event)"
  />
</app-base-device-preferences>
