<div
  class="max-w-4xl w-full bg-white dark:bg-slate-900 rounded-3xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800"
>
  <div class="p-8 md:p-12">
    <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
      <div>
        <h1 class="text-3xl font-black text-slate-900 dark:text-white mb-2">Laptop Preferences</h1>
        <p class="text-slate-500 dark:text-slate-400">
          Tell us what matters most to find your perfect match.
        </p>
      </div>
    </div>

    <div class="flex-col flex gap-4">
      <app-battery-performance-input
        [value]="batteryPriority"
        (valueChange)="batteryPriority = $event"
      />

      <app-ram-choice-input [value]="ramOption" (valueChange)="ramOption = $event" />

      <app-display-size-input [value]="displaySize" (valueChange)="displaySize = $event" />

      <app-price-range-input [value]="priceRange" (valueChange)="priceRange = $event" />

      <div
        class="pt-8 flex items-center justify-end border-t border-slate-100 dark:border-slate-800"
      >
        <button
          class="flex items-center gap-2 px-10 py-4 bg-primary hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-blue-500/20 cursor-pointer"
          type="button"
          (click)="onSubmit()"
        >
          Next Step
          <span class="material-symbols-outlined text-xl!">arrow_forward</span>
        </button>
      </div>
    </div>
  </div>
</div>
