<div>
  <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">
    {{ label }}
  </p>
  <div class="flex gap-3">
    @for (opt of options; track opt.value) {
      <button
        type="button"
        class="flex-1 rounded-xl px-2 py-3 text-center transition-colors"
        [class.bg-primary]="isSelected(opt.value)"
        [class.text-white]="isSelected(opt.value)"
        [class.shadow-lg]="isSelected(opt.value)"
        [class.shadow-primary/20]="isSelected(opt.value)"
        [class.bg-slate-50]="!isSelected(opt.value)"
        [class.dark:bg-slate-800]="!isSelected(opt.value)"
        [class.text-slate-600]="!isSelected(opt.value)"
        [class.dark:text-slate-300]="!isSelected(opt.value)"
        [class.hover:bg-slate-100]="!isSelected(opt.value)"
        (click)="onSelect(opt.value)"
      >
        <span class="block text-sm font-bold">{{ opt.label }}</span>
        <span
          class="mt-0.5 block text-[10px] font-medium"
          [class.text-blue-100]="isSelected(opt.value)"
          [class.text-slate-400]="!isSelected(opt.value)"
        >
          {{ opt.detail }}
        </span>
      </button>
    }
  </div>
</div>
