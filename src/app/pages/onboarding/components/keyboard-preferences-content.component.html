<div class="flex flex-col gap-8">
  <app-accessory-feature-select
    label="Keyboard Type"
    [value]="value.type"
    [options]="typeOptions"
    (valueChange)="onTypeChange($event)"
  />

  <app-accessory-budget-input
    [value]="value.budget"
    (valueChange)="onBudgetChange($event)"
  />
</div>
