<button
  class="profile-card group flex flex-col items-start p-8 bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 rounded-3xl hover:border-primary dark:hover:border-primary hover:shadow-xl hover:shadow-primary/10 transition-all text-left"
  type="button"
>
  <div
    class="w-14 h-14 rounded-2xl bg-blue-50 dark:bg-blue-900/30 flex items-center justify-center text-primary mb-6 group-hover:bg-primary group-hover:text-white transition-colors"
  >
    <app-icon [name]="icon()" size="xl" />
  </div>
  <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">
    {{ title() }}
  </h3>
  <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
    {{ description() }}
  </p>
</button>
