<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
  <main class="grow flex items-center justify-center py-12 px-6">
    <div
      class="w-full max-w-110 bg-white dark:bg-slate-900 rounded-2xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800 p-8 md:p-10"
    >
      <div class="flex flex-col items-center gap-2 mb-8">
        <div class="flex items-center gap-3">
          <div class="text-primary">
            <app-icon name="manage_search" customClass="!text-[40px]" />
          </div>
          <h1 class="text-2xl font-black tracking-tight text-slate-900 dark:text-white">
            SmartCompare
          </h1>
        </div>
        <div class="mt-4 text-center">
          <h2 class="text-xl font-bold text-slate-900 dark:text-white">Welcome Back</h2>
          <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">
            Please enter your details to sign in
          </p>
        </div>
      </div>

      @if (loginError()) {
        <p class="mb-4 text-sm text-red-600 dark:text-red-400">
          Invalid email or password. Please try again.
        </p>
      }
      <form class="space-y-5" (ngSubmit)="onSubmit()">
        <app-form-input
          [(ngModel)]="email"
          name="email"
          label="Email Address"
          type="email"
          placeholder="name@company.com"
          icon="mail"
          id="email"
        />
        <app-form-input
          [(ngModel)]="password"
          name="password"
          label="Password"
          type="password"
          placeholder="••••••••"
          icon="lock"
          id="password"
        />
        <button
          type="submit"
          [disabled]="loginLoading()"
          class="w-full bg-primary hover:bg-blue-700 disabled:opacity-70 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-500/25 flex items-center justify-center gap-2"
        >
          {{ loginLoading() ? 'Signing in...' : 'Log In' }}
        </button>
      </form>

      <div class="mt-10 text-center">
        <p class="text-sm text-slate-500 dark:text-slate-400">
          Don't have an account?
          <a [routerLink]="['/signup']" [queryParams]="{ returnUrl: returnUrl }" class="text-primary font-bold hover:underline ml-1">Sign Up</a>
        </p>
      </div>
    </div>
  </main>
</div>
